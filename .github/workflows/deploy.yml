    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          IMAGE="$REGION-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/dreamride-f5c400d5"
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          IMAGE="$REGION-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/dreamride-f5c400d5:${{ github.sha }}"
          gcloud run deploy dreamride-f5c400d5 \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet

      - name: Print service URL
        run: echo "Deployed to ${{ needs.provision.outputs.service_url }}"
