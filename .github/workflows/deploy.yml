    defaults:
      run:
        working-directory: infra/terraform
    outputs:
      service_url: ${{ steps.tf_out.outputs.service_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Ensure GCS state bucket exists
        run: |
          BUCKET="${{ env.GCP_PROJECT_ID }}-agentflow-tf-state"
          gsutil ls gs://$BUCKET 2>/dev/null || \
          gsutil mb -p ${{ env.GCP_PROJECT_ID }} gs://$BUCKET

      - name: Ensure Artifact Registry repository exists
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          gcloud artifacts repositories describe agentflow \
            --location=$REGION --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create agentflow \
            --repository-format=docker \
            --location=$REGION \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="AgentFlow generated application images"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-agentflow-tf-state" \
            -backend-config="prefix=dreamride-f5c400d5"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION || 'us-central1' }}" \
            -var="service_name=dreamride-f5c400d5" \
            -var="image=${{ env.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/dreamride-f5c400d5:${{ github.sha }}"

      - name: Capture service URL
        id: tf_out
        run: echo "service_url=$(terraform output -raw service_url)" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: provision
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY: '{"type": "service_account", "project_id": "agentflow-496320", "private_key_id": "f47337140f5c8085bfceb755084f5b707fa13540", "private_key": "-----BEGIN PRIVATE KEY-----\nMIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCe2I5Mc7Sq1Bbp\nARFM9CAQz0V5aTSvrQsYSny3rs1frDblM3e7xEN7qazBUW5l/0FbGO+pVrVJGK+4\n1K+RhzfCmaJTgOWZ9T4P7nqvHGdEDNJ04cfN/p099mSMAwAzxZWsl8aCTvsIOEjk\novPE3Ma1BWuAD6vPdITSORZ62nigE/80sj7p9sYLjLVYeIe736lLV2hxepDPObf+\ne1LCi454qi5qucHazV/w1kiiFUBKUq6Hb9o4tkxDNCSYegzEgbWb1ftlvR0hd/wd\nQCvxdxoFgED5vAzr5TQrlfq7HsKAqgDX9GkOF29s98Z8r0GfVNJstaklNlxrgz7r\nbzUbKK9zAgMBAAECggEAFRXjAcQEMf74UZK6NLBdR030R3MPMtiyFdXha1KRYYdP\nPCqSVMLvQE2cKIdCM9jn2ItdWOmxI9RakxrseVFtNfBF63a7Q64ZwGykLXWEQbTA\nBRLpfm8zeUOpQiqtzrGGNkRpbefFC+jIyEzXNgUmfWYMSJIL+PxbGzrHwKQaigkX\n9OVfHOkLp0SjUomNiGJKg4UKLiyJBcbJ5EjbdMUrepFYtD1ZS+AR3llXNgLMF0HQ\nQqocXTRYd9aTnmf9Z63wT/fLqbLHBuHDgv6Rrk+I7yCkesyv50mgvXsifVrqntLa\n2bzRj9ASUIhBSVRJDvrFjPYEgyLT70F2IdkVaw93pQKBgQDOVQDk8Tg9H86nBOkJ\ncIpUex7ulB8lQiYKbgnQBnAOs+wiBmW7n32CK8GIP+XZL/uNsfQYbBTG1iRNxbdg\nDGTRO8XckXiI4qSgfPZdm9LdT4HbPj0A1xD+wZhIDwE4niuY9naF8IYBu89FuuYh\nx8xoj9cHQephSQTUfIQoR9/l5wKBgQDFFUUHzaEMEVOo+YhIGzmzzyjftIVVRAPm\nccXt+khtQICvZm5B5ytiZk4paayRQWSL49FykphC5qNbnO9wTPWIo67Yf7YSgwsj\nz22N+zTCs650sp5/qBSjYSMdfhgneU7Jrb1LItEekxTweVlZbDe5TwtY8tbFcVix\nlB9KNK0glQKBgBPpxkVSNoBHspUR9z+u+dq/azPRXdQltzAogI/wHx58JNz/yw+5\ni85lVK9Go3M7m0aIlytIOxUZk7Vh0JnXeF9tKmJoM77aSNMoXEqagFZVlw3GyvJq\nzzwXCRBjSlXhhgmkN7ojhXtjWdS7/fvioYqx3ynXJbyv5GRxg/uzPBufAoGAbLID\nZX9akB5KRsqBCEvDslDR2TdlxhYCFKmxIURFh8PodVSIAN7vRZDpENwQafhn7ONU\nE92YDmXHuPI/+G7piFfGSe99yo3tqe1wHbtraOrSj9gnpH5eC5G6XTy7M6Iq+v5Q\nhU0JitRR2yMCTVhrD0/yETe1jiWqZh4sd6+/wFUCgYBiaPY0sIKTL9p/B4QA3qmL\nIJmyRl8O8bxzbGZNOIZ2W2lX4yCm6mTGxUvOJcHh8l9pDo3ovCg4DopbAdXpk6Lm\n2nSdn2/PgOfIHZ8oqg0C6fcDc8I8yXIsNZH1KjPSKyQu1wkQMQ4cEwoiPJrXyOBj\nI1UgfHmifxklcJ7N3a0tUw==\n-----END PRIVATE KEY-----\n", "client_email": "agentflow-deployer@agentflow-496320.iam.gserviceaccount.com", "client_id": "1028745242783